<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        border: 1px solid black;
        /* Soln for Great Collapse */
        overflow: auto;
      }
      .item {
        height: 200px;
        width: 200px;
        background-color: greenyellow;
        margin: 3px;
        border: 1px solid red;
        /* Jab ye float nhi likhe rhenge tb normally teeno box rhega niche nice but ye likhte hi jo main dic hai vo ek line jaissa dikhne lagega and teeno boc ek hi line me aa jayenge isey hi ((Great Collapse)) kahte hain */
        /* Isse bachne ke liye humey parent container me overflow ko auto mark krna padega */
        float: left;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
    </div>
  </body>
</html>
