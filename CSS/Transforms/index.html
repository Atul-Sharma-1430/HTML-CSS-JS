<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transforms</title>
    <style>
      .box {
        height: 300px;
        width: 300px;
        border: 2px solid black;
        background-color: rgb(196, 196, 69);

        display: flex;
        justify-content: center;
        align-items: center;

        margin: auto; /*Isse Bech me aa jaayega page ke*/

        transition: all ease 1s;
      }

      .box:hover {
        /* border-radius: 50%; */

        /* transform: translate3d() scale3d() rotate3d() ==> We generally folly this syntax to use transform*/
        transform: translateX(200px) rotate(360deg) translateY(200px);

        /* transform: rotate(45deg); */
        /* transform: rotate(0.25turn); turn krega basically 4g deg jaisa hi kaam krega */

        /* transform: scale(1.2);  Increases size */
        /* transform: scale(0.4);  Decreases size */

        /* transform: scaleX(2);   X direction 
        transform: scaleY(2);   Y direction 
        transform: scaleY(2);   Z direction */

        /* transform: scale3d(1.2, 1.2, 1.2); X Y Z sab side ke cordniates */

        /* transform: matrix(a, b, c, d, e, f); */
        /*  a = scaleX      (width ka size change)
            b = skewY       (vertical tilt)
            c = skewX       (horizontal tilt)
            d = scaleY      (height ka size change)
            e = translateX  (left-right move)
            f = translateY  (up-down move) */
        /* transform: matrix(1, 0, 0, 1, 100, 50); */

        /* transform: skew(45deg);  tilt krne ke liye */
        /* transform: skewY(1.07rad);  */

        /* +y = down  +x = right */
        /* transform: translate(200px);  will move to right */
        /* transform: translate(0, -300px);   will move to up */
        /* transform: translate(400px, -400px);  it will move to bottom right */
        /* transform: translate3d(400px, -400px, 100px);  */
      }

      p {
        height: 300px;
        width: 300px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: xx-large;
        transition: all ease 0.3s;
      }

      /* p:hover {
        transform: rotate(-45deg);
        border-radius: 50%;
      } */
    </style>
  </head>
  <body
    style="
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    "
  >
    <div class="box">
      <p>I am a box</p>
    </div>
  </body>
</html>
