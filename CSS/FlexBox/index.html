<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlexBox</title>
    <style>
      .container {
        height: 700px;
        padding: 3px;
        border: 3px solid red;
        box-sizing: border-box;
        background-color: lightblue;
        display: flex;

        /* flex-direction: column;
        flex-wrap: wrap-reverse; */
        flex-flow: row nowrap; /* Shorthand for flex direction and flex wrap */

        justify-content: center; /*Arranges items along main axis*/
        align-items: stretch; /*Arranges items along cross axis*/ /* Stretch tab work krta hai jab height ya width nhi set hai toh us axis ke hisaab se kaam karta hai poora elongate ho jaayega */
        align-content: start; /*Isse Beech ki spacing manage krte hai jab wrap on rhta hai tab*/
      }

      .box {
        height: 180px;
        width: 180px;
        border: 1px solid rgb(0, 0, 0);
        margin: 5px;
        padding-left: 10px;
        box-sizing: border-box;
      }

      #box1 {
        background-color: red;
        order: 10;
        /* flex-shrink: 5;
        flex-grow: 1;
        flex-basis: 100px; */

        /* Shorthand:    flex: grow shrink basis; */
        /* flex: 1 1 200px; */

        align-self: self-end; /* align-self is used to control the alignment of a single flex item along the cross axis*/
      }

      #box2 {
        background-color: orange;
        order: -1;
        align-self: last baseline;
        /* flex: 1 1 200px; */
      }

      #box3 {
        background-color: grey;
        order: 2;
        /* flex: 1 1 200px; */
      }

      #box4 {
        background-color: yellow;
        order: 3;
        align-self: center;
        /* flex: 1 1 200px; */
        /* flex-basis: 400px;  Used to set Initial size before grow/shrink */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box" id="box1">1</div>
      <div class="box" id="box2">2</div>
      <div class="box" id="box3">3</div>
      <div class="box" id="box4">4</div>
    </div>
  </body>
</html>
