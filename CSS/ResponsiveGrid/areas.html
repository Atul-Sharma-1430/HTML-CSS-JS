<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Template Area</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100%;
        height: 100%;
      }

      .container {
        height: 100%;
        width: 100%;

        display: grid;
        gap: 1.2rem;
        padding: 5rem 20rem;
        background-color: lightpink;




        
        /* Grid template Area */
        grid-template-areas:
        /* Imagine The Matrix */

                      /* col1 col2 col3 */
        /* row 1*/    "header header header"  
        /* row 2*/    "sidebar c1 c1"
        /* row 3*/    "sidebar c2 c3"  
        /* row 4*/    "footer footer footer";  
      }

      .item {
        border: 2px solid black;
        background-color: rgb(86, 165, 235);
        padding: 1rem;
      }

      .header {
        grid-area: header;
      }

      .sidebar {
        grid-area: sidebar;
      }

      .c1 {
        grid-area: c1;
      }

      .c2 {
        grid-area: c2;
      }
      .c3 {
        grid-area: c3;
      }

      .footer {
        grid-area: footer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item header">Header</div>
      <div class="item sidebar">Sidebar</div>
      <div class="item c1">C1</div>
      <div class="item c2">C2</div>
      <div class="item c3">C3</div>
      <div class="item footer">Footer</div>
    </div>
  </body>
</html>
