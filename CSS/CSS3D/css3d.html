<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS3D Transforms</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100%;
        height: 100%;
        background-color: antiquewhite;
      }

      .container {
        padding: 3rem;
        background-color: rgb(70, 160, 142);

        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 50px;
      }

      .items {
        height: 200px;
        width: 200px;
        border: 1px solid black;
        border-radius: 30%;
        background-color: rgb(138, 8, 131);

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .b1:hover {
        transform: rotateX(-50deg);
      }
      .b2:hover {
        transform: rotateY(50deg);
      }
      .b3:hover {
        transform: rotateZ(60deg);
      }
      .b4:hover {
        transform: translateX(50px);
      }
      .b5:hover {
        transform: translateY(50px);
      }
      .b6:hover {
        transform: perspective(200px) translateZ(-50px); /* Perspective Because Z axis is coming out of the screen so we won't see any changes that's why*/
      }
      .b7:hover {
        transform: scaleX(1.8);
      }
      .b8:hover {
        transform: scaleY(1.8);
      }
      .b9:hover {
        transform: perspective(200px) scaleZ(2) rotateY(45deg); /*rotate is just bto see the changes when scaling*/
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="items b1">RotateX</div>
      <div class="items b2">RotateY</div>
      <div class="items b3">RotateZ</div>
      <div class="items b4">TranslateX</div>
      <div class="items b5">TranslateY</div>
      <div class="items b6">TranslateZ</div>
      <div class="items b7">ScaleX</div>
      <div class="items b8">ScaleY</div>
      <div class="items b9">ScaleZ</div>
    </div>
  </body>
</html>
