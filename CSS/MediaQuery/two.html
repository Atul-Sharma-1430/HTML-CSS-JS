<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        border: 3px solid black;
        background-color: blueviolet;
        padding: 10px;
        box-sizing: border-box;
        display: flex;
        flex-direction: row;
      }

      .box {
        height: 200px;
        width: 200px;
        border: 1px solid black;
        background-color: blue;
        margin: 10px;
        box-sizing: border-box;
      }

      p {
        border: 1px solid black;
      }

      #boxleft {
        height: 300px;
        width: 45%;
        padding: 5px;
        margin: 3px;
        display: flex;
        flex-direction: column;
        border: 1px solid black;
        background-color: aqua;
      }

      #boxright {
        height: 300px;
        width: 45%;
        padding: 5px;
        margin: 3px;
        border: 1px solid black;
        background-color: rgb(34, 192, 20);
      }

      @media (max-width: 640px) {
        .container {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="boxleft">
        <p>Text 1</p>
        <p>Text 2</p>
      </div>
      <div id="boxright">
        <div class="box"></div>
      </div>
    </div>
  </body>
</html>
