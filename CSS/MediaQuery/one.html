<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        border: 10px solid Black;
        padding: 5px;
        margin: 2px;
        height: 500px;
        display: flex;
        /* flex-wrap: wrap; */
        /* flex-direction: row;
        justify-content: start;
        align-items: start;
        align-content: center; */
      }

      .box {
        height: 200px;
        width: 200px;
        border: 1px solid black;
        background-color: blue;
        margin: 10px;
        box-sizing: border-box;
      }

      #box1 {
        background-color: bisque;
      }

      #box2 {
        background-color: rgb(8, 217, 217);
      }

      #box3 {
        background-color: rgb(92, 171, 236);
      }

      #box4 {
        background-color: rgb(228, 24, 24);
      }

      /* Matlab 640 px kam se kam chahiye ye css lagne ke liye measn jab size ye ya isse jyada rhega tab ye css lagega */
      @media (min-width: 640px) {
        .container {
          flex-direction: row;
        }
      }

      @media (max-width: 640px) {
        .container {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box" id="box1"></div>
      <div class="box" id="box2"></div>
      <div class="box" id="box3"></div>
      <div class="box" id="box4"></div>
    </div>
  </body>
</html>
